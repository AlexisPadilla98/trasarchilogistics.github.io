    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
        <img id="lightboxImg" src="" alt="Vista Previa">
        <div class="lightbox-nav">
            <button onclick="prevImg()"><i class="fas fa-arrow-left"></i> Anterior</button>
            <button onclick="nextImg()">Siguiente <i class="fas fa-arrow-right"></i></button>
        </div>
    </div>

    <script>
const grid = document.getElementById('galleryGrid');
    const items = document.querySelectorAll('.gallery-item');
    const filterBtns = document.querySelectorAll('.filter-btn');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    let currentIdx = 0;
    let visibleImagesSrc = []; // Guardaremos solo las rutas (src) de las imágenes visibles

    // 1. Lógica de Filtrado
    filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            // Quitar clase activa a todos los botones y ponérsela al que se hizo clic
            filterBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const filter = btn.getAttribute('data-filter');

            // Mostrar/Ocultar elementos según el filtro
            items.forEach(item => {
                if (filter === 'all' || item.getAttribute('data-cat') === filter) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        });
    });

    // 2. Lógica al hacer clic en una imagen
    items.forEach(item => {
        item.addEventListener('click', () => {
            // Recalcular cuáles son las imágenes que están visibles en este momento
            const visibleItems = Array.from(items).filter(el => window.getComputedStyle(el).display !== 'none');
            // Extraer solo la ruta (src) de esas imágenes
            visibleImagesSrc = visibleItems.map(el => el.querySelector('img').src);
            
            const clickedImgSrc = item.querySelector('img').src;
            currentIdx = visibleImagesSrc.indexOf(clickedImgSrc); // Saber en qué número de foto estamos
            
            openLightbox(clickedImgSrc);
        });
    });

    // 3. Funciones del Lightbox
    function openLightbox(src) {
        lightboxImg.src = src;
        lightbox.classList.add('active');
    }

    function closeLightbox() {
        lightbox.classList.remove('active');
    }

    function nextImg() {
        if (visibleImagesSrc.length === 0) return;
        currentIdx = (currentIdx + 1) % visibleImagesSrc.length; // Avanza y vuelve a empezar si llega al final
        lightboxImg.src = visibleImagesSrc[currentIdx];
    }

    function prevImg() {
        if (visibleImagesSrc.length === 0) return;
        currentIdx = (currentIdx - 1 + visibleImagesSrc.length) % visibleImagesSrc.length; // Retrocede
        lightboxImg.src = visibleImagesSrc[currentIdx];
    }

    // 4. Soporte para usar el teclado (Opcional pero muy profesional)
    document.addEventListener('keydown', (e) => {
        if (!lightbox.classList.contains('active')) return; // Solo funciona si el visor está abierto
        
        if (e.key === 'ArrowRight') nextImg();
        if (e.key === 'ArrowLeft') prevImg();
        if (e.key === 'Escape') closeLightbox();
    });

    // Cerrar al hacer clic fuera de la imagen
    lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) closeLightbox();
    });
    </script>
